# FCS — standard column definitions (WFP VAM naming convention)
# Values: frequency of consumption in days (0–7)
columns:
  FCSStap:   { type: float, min: 0, max: 7, required: true }
  FCSPulse:  { type: float, min: 0, max: 7, required: true }
  FCSDairy:  { type: float, min: 0, max: 7, required: true }
  FCSPr:     { type: float, min: 0, max: 7, required: true }
  FCSVeg:    { type: float, min: 0, max: 7, required: true }
  FCSFruit:  { type: float, min: 0, max: 7, required: true }
  FCSFat:    { type: float, min: 0, max: 7, required: true }
  FCSSugar:  { type: float, min: 0, max: 7, required: true }

# WFP standard weights (do not change without methodological justification)
weights:
  FCSStap:  2
  FCSPulse: 3
  FCSDairy: 4
  FCSPr:    4
  FCSVeg:   1
  FCSFruit: 1
  FCSFat:   0.5
  FCSSugar: 0.5

# Food Consumption Group thresholds (Poor < 21, Borderline 21–35, Acceptable > 35)
# Using 21/35 cut-offs (use 28/42 for sugar/oil-rich diets — set in configurable)
fcg_poor_threshold:       21
fcg_borderline_threshold: 35
